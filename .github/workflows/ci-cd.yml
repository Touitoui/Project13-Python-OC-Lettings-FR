name: CI/CD

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  ci:
    name: Lint + Tests + Coverage
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-secret-key
      DJANGO_ALLOWED_HOSTS: localhost
      DEBUG: "0"
      SENTRY_DSN: ""
      DJANGO_LOG_LEVEL: INFO
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint
        run: flake8 .

      - name: Run tests with coverage gate
        run: |
          pytest \
            --cov=lettings \
            --cov=profiles \
            --cov=oc_lettings_site \
            --cov-report=term-missing \
            --cov-fail-under=80

  containerize:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag from commit SHA
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/oc-lettings-site:${{ steps.vars.outputs.short_sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/oc-lettings-site:latest

  deploy_production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: containerize
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Trigger deployment hook
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"