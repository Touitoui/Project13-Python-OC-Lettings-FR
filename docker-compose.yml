services:
  django-web:
    build: .
    container_name: django-web
    ports:
      - "8000:8000"
    environment:
      SENTRY_DSN: ${SENTRY_DSN}
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      DJANGO_LOG_LEVEL: ${DJANGO_LOG_LEVEL}
      DEBUG: ${DEBUG}
      DATABASE_NAME: ${DATABASE_NAME}
    env_file:
      - .env
    volumes:
      - .:/app
